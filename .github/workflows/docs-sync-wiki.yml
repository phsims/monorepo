name: Sync docs to GitHub Wiki

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
  workflow_dispatch:
    inputs:
      full_overwrite:
        description: "When true, completely replace wiki contents from repository docs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Clone wiki repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git clone "${WIKI_URL}" wiki

      - name: Prepare wiki contents
        env:
          FULL_OVERWRITE: ${{ github.event_name == 'workflow_dispatch' && inputs.full_overwrite == 'true' && 'true' || 'false' }}
        run: |
          set -e

          # Optionally wipe existing wiki contents (except .git) for a full overwrite
          cd wiki
          if [ "${FULL_OVERWRITE}" = "true" ]; then
            echo "Full overwrite enabled – clearing existing wiki contents..."
            find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          fi
          cd ..

          # Ensure wiki directory exists
          mkdir -p wiki

          # Map wiki home:
          # - Prefer docs/wiki-home.md if present
          # - Fall back to the root README.md
          if [ -f "docs/wiki-home.md" ]; then
            cp "docs/wiki-home.md" "wiki/Home.md"
          elif [ -f "README.md" ]; then
            cp "README.md" "wiki/Home.md"
          fi

          # Sync docs/ folder (if present) into wiki/docs
          if [ -d "docs" ]; then
            mkdir -p "wiki/docs"
            rsync -av --delete \
              "docs/" "wiki/docs/"
          fi

          # Copy all README.md files from the repo, preserving relative paths inside the wiki
          # This keeps app/lib/theme READMEs available in the wiki in a one-way fashion.
          while IFS= read -r -d '' file; do
            rel_path="${file#./}"
            dest="wiki/${rel_path}"
            mkdir -p "$(dirname "${dest}")"
            cp "${file}" "${dest}"
          done < <(find . -name "README.md" -print0)

          # Special mapping: expose Tailwind themes README as a top-level wiki page
          if [ -f "themes/tailwind-themes/README.md" ]; then
            cp "themes/tailwind-themes/README.md" "wiki/Tailwind-themes.md"
          fi

      - name: Commit and push wiki changes
        run: |
          set -e

          cd wiki
          if git status --porcelain | grep . >/dev/null 2>&1; then
            echo "Changes detected – committing and pushing to wiki."
            git add .
            git commit -m "Sync docs from ${GITHUB_SHA}"
            git push
          else
            echo "No changes to sync to wiki."
          fi

