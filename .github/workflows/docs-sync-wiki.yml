name: Sync docs to GitHub Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:
    inputs:
      full_overwrite:
        description: 'When true, completely replace wiki contents from repository docs'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      # Wiki must be enabled in repo Settings, and at least one page created, so the wiki git repo exists.
      - name: Clone wiki repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git clone "${WIKI_URL}" wiki

      - name: Prepare wiki contents
        env:
          FULL_OVERWRITE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_overwrite == 'true' && 'true' || 'false' }}
        run: |
          set -e

          # Optionally wipe existing wiki contents (except .git) for a full overwrite
          cd wiki
          if [ "${FULL_OVERWRITE}" = "true" ]; then
            echo "Full overwrite enabled – clearing existing wiki contents..."
            find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          fi
          cd ..

          # Ensure wiki directory exists
          mkdir -p wiki

          # Only files under docs/ are synced to the wiki; all other READMEs and docs are ignored.

          # Wiki home: prefer docs/wiki-home.md, else docs/README.md (only from docs/)
          if [ -f "docs/wiki-home.md" ]; then
            cp "docs/wiki-home.md" "wiki/Home.md"
          elif [ -f "docs/README.md" ]; then
            cp "docs/README.md" "wiki/Home.md"
          fi

          # Custom sidebar at wiki root (GitHub uses _Sidebar.md for the wiki sidebar)
          if [ -f "docs/_Sidebar.md" ]; then
            cp "docs/_Sidebar.md" "wiki/_Sidebar.md"
          fi

          # Sync docs/ into wiki/docs (exclude _Sidebar.md so it only lives at wiki root)
          if [ -d "docs" ]; then
            mkdir -p "wiki/docs"
            rsync -av --delete --exclude='_Sidebar.md' \
              "docs/" "wiki/docs/"
          fi

      - name: Commit and push wiki changes
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -e

          cd wiki
          if git status --porcelain | grep . >/dev/null 2>&1; then
            echo "Changes detected – committing and pushing to wiki."
            git add .
            git commit -m "Sync docs from ${GITHUB_SHA}"
            git push
          else
            echo "No changes to sync to wiki."
          fi
